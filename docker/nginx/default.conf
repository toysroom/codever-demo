server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public;

    # DNS Docker: evita 502 dopo restart/ricreazione container PHP (IP cambia; nginx risolve solo all’avvio se passi il nome fisso).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $fastcgi_upstream app:9000;

    # Increase upload limits
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass $fastcgi_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increase FastCGI timeouts for large uploads
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }
}
