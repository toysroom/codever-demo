services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: zelante-php
    container_name: zelante-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html
      - composer_cache:/tmp/composer
    environment:
      PHP_IDE_CONFIG: "serverName=zelante"
    depends_on:
      - mysql
      - redis
    networks:
      - zelante

  nginx:
    image: nginx:alpine
    container_name: zelante-nginx
    ports:
      - 8480:80
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    environment:
      - SHELL=/bin/bash
    networks:
      - zelante

  mysql:
    image: mysql:8.0.45
    container_name: zelante-mysql
    restart: unless-stopped
    ports:
      - "5011:3306" # Navicat / client esterni: localhost:5011
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zelante
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - zelante

  phpmyadmin:
    image: phpmyadmin:5
    container_name: zelante-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8481:80"
    depends_on:
      - mysql
    networks:
      - zelante


  jenkins:
    image: jenkins/jenkins:lts
    container_name: zelante-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8492:8080"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_BUILDKIT=1
      - SHELL=/bin/bash
    networks:
      - zelante
    command: >
      bash -c "
        # Install Docker CLI and FTP tools
        apt-get update &&
        apt-get install -y docker.io lftp bash &&
        rm -rf /var/lib/apt/lists/* &&
        # Start Jenkins
        /usr/local/bin/jenkins.sh
      "
  redis:
    image: redis:7-alpine
    container_name: zelante-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zelante
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:latest
    container_name: zelante-redisinsight
    restart: unless-stopped
    ports:
      - "8482:5540" # UI: http://localhost:8482 — in-app: host redis, porta 6379
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - zelante

  mailpit:
    image: axllent/mailpit:latest
    container_name: zelante-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - zelante

  horizon:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: zelante-php
    container_name: zelante-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - composer_cache:/tmp/composer
    command: php artisan horizon
    depends_on:
      - mysql
      - redis
    networks:
      - zelante
    environment:
      PHP_IDE_CONFIG: "serverName=zelante"

volumes:
  mysql_data:
  jenkins_home:
  composer_cache:
  redis_data:
  redisinsight_data:

networks:
  zelante:
    driver: bridge
